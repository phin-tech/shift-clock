name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN: shift-clock

jobs:
  build:
    name: build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        run: |
          dist="${BIN}-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p "$dist"
          cp "target/${{ matrix.target }}/release/${BIN}" "$dist/"
          cp README.md LICENSE "$dist/" 2>/dev/null || true
          tar -czf "${dist}.tar.gz" "$dist"
          shasum -a 256 "${dist}.tar.gz" > "${dist}.tar.gz.sha256" || sha256sum "${dist}.tar.gz" > "${dist}.tar.gz.sha256"

      - name: Publish to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.BIN }}-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
          generate_release_notes: true

  homebrew:
    name: bump homebrew tap
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Guard on tap token
        id: guard
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "No HOMEBREW_TAP_TOKEN secret set — skipping tap bump."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout tap
        if: steps.guard.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          repository: phin-tech/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Render formula
        if: steps.guard.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VER="${TAG#v}"
          REPO="phin-tech/shift-clock"
          base="https://github.com/${REPO}/releases/download/${TAG}"

          # Pull the sha256 sidecars produced by the build jobs.
          gh release download "$TAG" -R "$REPO" -p '*.sha256' -D sums

          sha() { awk '{print $1}' "sums/${BIN}-${TAG}-$1.tar.gz.sha256"; }
          MAC_ARM=$(sha aarch64-apple-darwin)
          MAC_X86=$(sha x86_64-apple-darwin)
          LIN_ARM=$(sha aarch64-unknown-linux-gnu)
          LIN_X86=$(sha x86_64-unknown-linux-gnu)

          mkdir -p tap/Formula
          cat > tap/Formula/shift-clock.rb <<EOF
          # Auto-generated by shift-clock's release workflow. Do not edit by hand.
          class ShiftClock < Formula
            desc "Local, language-agnostic durable workflow orchestrator"
            homepage "https://github.com/${REPO}"
            version "${VER}"
            license "MIT"

            on_macos do
              on_arm do
                url "${base}/${BIN}-${TAG}-aarch64-apple-darwin.tar.gz"
                sha256 "${MAC_ARM}"
              end
              on_intel do
                url "${base}/${BIN}-${TAG}-x86_64-apple-darwin.tar.gz"
                sha256 "${MAC_X86}"
              end
            end

            on_linux do
              on_arm do
                url "${base}/${BIN}-${TAG}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${LIN_ARM}"
              end
              on_intel do
                url "${base}/${BIN}-${TAG}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${LIN_X86}"
              end
            end

            def install
              bin.install "${BIN}"
            end

            test do
              assert_match "${BIN}", shell_output("#{bin}/${BIN} --version")
            end
          end
          EOF

      - name: Commit to tap
        if: steps.guard.outputs.skip != 'true'
        working-directory: tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/shift-clock.rb
          git commit -m "shift-clock ${GITHUB_REF_NAME}" || { echo "no changes"; exit 0; }
          git push
