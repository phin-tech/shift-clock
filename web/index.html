<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>shift-clock</title>
<style>
  :root {
    --bg: #fbfbfa; --panel: #fff; --ink: #1a1a1a; --muted: #6b7280;
    --line: #e5e7eb; --accent: #2563eb; --hover: #f3f4f6;
    --run: #2563eb; --ok: #16a34a; --fail: #dc2626; --park: #d97706; --child: #7c3aed;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1115; --panel: #171a21; --ink: #e6e6e6; --muted: #9aa1ac;
      --line: #262b36; --accent: #60a5fa; --hover: #1e2230;
      --run: #60a5fa; --ok: #4ade80; --fail: #f87171; --park: #fbbf24; --child: #a78bfa;
    }
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  header { display: flex; align-items: baseline; gap: 12px; padding: 14px 20px;
    border-bottom: 1px solid var(--line); position: sticky; top: 0; background: var(--bg); z-index: 5; }
  header h1 { font: 600 16px var(--mono); margin: 0; letter-spacing: -0.02em; }
  header .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); display: inline-block; }
  header .dot.up { background: var(--ok); }
  header .sub { color: var(--muted); font-size: 12px; }
  .tabs { display: flex; gap: 4px; padding: 0 16px; border-bottom: 1px solid var(--line); }
  .tab { padding: 9px 14px; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; font-weight: 500; }
  .tab.active { color: var(--ink); border-bottom-color: var(--accent); }
  .wrap { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1.1fr); gap: 0; height: calc(100vh - 108px); }
  @media (max-width: 820px) { .wrap { grid-template-columns: 1fr; } .detail { display: none; } .detail.open { display: block; } }
  .list, .detail { overflow-y: auto; padding: 14px 16px; }
  .detail { border-left: 1px solid var(--line); }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em;
    color: var(--muted); font-weight: 600; padding: 6px 8px; position: sticky; top: 0; background: var(--bg); }
  td { padding: 7px 8px; border-top: 1px solid var(--line); font-family: var(--mono); font-size: 12.5px; }
  tr.row { cursor: pointer; }
  tr.row:hover td { background: var(--hover); }
  tr.row.sel td { background: color-mix(in srgb, var(--accent) 12%, transparent); }
  td.child-cell { padding-left: 22px; position: relative; }
  td.child-cell::before { content: "└"; position: absolute; left: 8px; color: var(--child); }
  .pill { display: inline-block; padding: 1px 8px; border-radius: 999px; font: 600 11px var(--mono);
    border: 1px solid transparent; }
  .pill.running { color: var(--run); background: color-mix(in srgb, var(--run) 14%, transparent); }
  .pill.success { color: var(--ok); background: color-mix(in srgb, var(--ok) 14%, transparent); }
  .pill.failed  { color: var(--fail); background: color-mix(in srgb, var(--fail) 14%, transparent); }
  .pill.waiting, .pill.sleeping { color: var(--park); background: color-mix(in srgb, var(--park) 16%, transparent); }
  .pill.pending { color: var(--muted); background: color-mix(in srgb, var(--muted) 14%, transparent); }
  .muted { color: var(--muted); }
  .detail h2 { font: 600 14px var(--mono); margin: 0 0 2px; }
  .meta { display: grid; grid-template-columns: auto 1fr; gap: 2px 14px; margin: 10px 0 16px; font-size: 12.5px; }
  .meta dt { color: var(--muted); } .meta dd { margin: 0; font-family: var(--mono); }
  .sec { font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted);
    font-weight: 600; margin: 16px 0 6px; }
  .steps li { list-style: none; display: flex; gap: 8px; align-items: baseline; padding: 3px 0;
    font-family: var(--mono); font-size: 12px; border-top: 1px dashed var(--line); }
  .steps { padding: 0; margin: 0; }
  .steps .seq { color: var(--muted); width: 26px; } .steps .nm { flex: 1; }
  .steps .st.success { color: var(--ok); } .steps .st.failed { color: var(--fail); }
  .steps .st.started { color: var(--run); } .steps .st.skipped { color: var(--muted); }
  .stream { font-family: var(--mono); font-size: 11.5px; background: var(--panel);
    border: 1px solid var(--line); border-radius: 6px; padding: 8px; max-height: 320px; overflow-y: auto;
    white-space: pre-wrap; word-break: break-word; }
  .stream .ev { color: var(--accent); } .stream .lg { color: var(--ink); } .stream .er { color: var(--fail); }
  .stream .t { color: var(--muted); }
  .child-tree a { color: var(--child); text-decoration: none; cursor: pointer; font-family: var(--mono); }
  .child-tree a:hover { text-decoration: underline; }
  .empty { color: var(--muted); padding: 40px 8px; text-align: center; }
  .flow-card { border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; background: var(--panel); }
  .flow-card .fn { font: 600 13px var(--mono); } .flow-card .cmd { color: var(--muted); font-family: var(--mono); font-size: 11.5px; }
  code { font-family: var(--mono); }
</style>
</head>
<body>
<header>
  <h1>shift-clock</h1>
  <span class="dot" id="dot"></span>
  <span class="sub" id="sub">connecting…</span>
</header>
<div class="tabs">
  <div class="tab active" data-tab="runs">Runs</div>
  <div class="tab" data-tab="scheduled">Scheduled</div>
</div>

<div class="wrap" id="runs-view">
  <div class="list">
    <table>
      <thead><tr><th>Workflow</th><th>Flow</th><th>Status</th><th>Trigger</th></tr></thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="empty" id="rows-empty" hidden>No workflows yet — trigger one from the CLI.</div>
  </div>
  <div class="detail" id="detail">
    <div class="empty">Select a workflow to see its journal, children, and live stream.</div>
  </div>
</div>

<div class="list" id="sched-view" style="display:none">
  <div id="flows"></div>
</div>

<script>
const $ = (s, r=document) => r.querySelector(s);
const el = (t, c, txt) => { const e = document.createElement(t); if (c) e.className = c; if (txt != null) e.textContent = txt; return e; };
let selected = null, es = null;

async function jget(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

async function ping() {
  try { await jget("/health"); $("#dot").classList.add("up"); $("#sub").textContent = location.host + " · live"; }
  catch { $("#dot").classList.remove("up"); $("#sub").textContent = "daemon unreachable"; }
}

function pill(status) { const p = el("span", "pill " + status, status); return p; }

async function refreshRows() {
  let data;
  try { data = await jget("/workflows?limit=100"); } catch { return; }
  const wfs = data.workflows || [];
  // Build parent -> children grouping so children render indented under parents.
  const byId = Object.fromEntries(wfs.map(w => [w.id, w]));
  const roots = wfs.filter(w => !w.parent_id || !byId[w.parent_id]);
  const kids = {};
  for (const w of wfs) if (w.parent_id) (kids[w.parent_id] ||= []).push(w);

  const tb = $("#rows"); tb.textContent = "";
  $("#rows-empty").hidden = wfs.length > 0;
  const addRow = (w, isChild) => {
    const tr = el("tr", "row" + (w.id === selected ? " sel" : ""));
    tr.dataset.id = w.id;
    const c1 = el("td", isChild ? "child-cell" : "", w.id);
    tr.append(c1, el("td", "", w.deployment));
    const c3 = el("td"); c3.append(pill(w.status)); tr.append(c3);
    tr.append(el("td", "", w.trigger));
    tr.onclick = () => selectWf(w.id);
    tb.append(tr);
    (kids[w.id] || []).sort((a,b) => a.created_at < b.created_at ? -1 : 1).forEach(k => addRow(k, true));
  };
  roots.forEach(w => addRow(w, false));
}

async function selectWf(id) {
  selected = id;
  document.querySelectorAll("tr.row").forEach(r => r.classList.toggle("sel", r.dataset.id === id));
  const d = $("#detail"); d.classList.add("open"); d.textContent = "";
  let data;
  try { data = await jget("/workflows/" + id); } catch { d.append(el("div", "empty", "gone")); return; }
  const w = data.workflow, steps = data.steps || [];

  d.append(el("h2", null, w.id));
  const meta = el("dl", "meta");
  const put = (k, v) => { meta.append(el("dt", null, k)); const dd = el("dd", null, ""); if (v instanceof Node) dd.append(v); else dd.textContent = v ?? "—"; meta.append(dd); };
  put("flow", w.deployment); put("status", pill(w.status)); put("trigger", w.trigger);
  put("attempts", String(w.attempts)); put("created", w.created_at);
  if (w.finished_at) put("finished", w.finished_at);
  if (w.parent_id) { const a = el("a", null, w.parent_id); a.onclick = () => selectWf(w.parent_id); const s = el("span"); s.append(a); put("parent", s); }
  if (w.output != null) put("output", el("code", null, JSON.stringify(w.output)));
  if (w.error) put("error", w.error);
  d.append(meta);

  // Children tree
  try {
    const ch = (await jget("/workflows/" + id + "/children")).children || [];
    if (ch.length) {
      d.append(el("div", "sec", "children (" + ch.length + ")"));
      const box = el("div", "child-tree");
      ch.forEach(c => {
        const line = el("div"); const a = el("a", null, c.id); a.onclick = () => selectWf(c.id);
        line.append(a, el("span", null, "  "), pill(c.status)); box.append(line);
      });
      d.append(box);
    }
  } catch {}

  // Step journal
  d.append(el("div", "sec", "journal"));
  const ul = el("ul", "steps");
  if (!steps.length) ul.append(el("li", null, "no steps"));
  steps.forEach(s => {
    const li = el("li");
    li.append(el("span", "seq", "#" + s.seq), el("span", "nm", s.name),
      el("span", "st " + s.status, s.status),
      el("span", "muted", s.duration_ms != null ? s.duration_ms + "ms" : ""));
    ul.append(li);
  });
  d.append(ul);

  // Live stream (backlog + live), replacing any prior EventSource
  d.append(el("div", "sec", "stream"));
  const log = el("div", "stream"); d.append(log);
  if (es) es.close();
  es = new EventSource("/workflows/" + id + "/stream");
  es.onmessage = (m) => {
    let env; try { env = JSON.parse(m.data); } catch { return; }
    const p = env.payload || {};
    const row = el("div");
    row.append(el("span", "t", (env.ts || "").slice(11, 19) + " "));
    if (env.kind === "log") row.append(el("span", p.stream === "stderr" ? "er" : "lg", p.line || ""));
    else row.append(el("span", "ev", p.type || "event"), el("span", "muted", p.task ? "  " + p.task : ""));
    log.append(row); log.scrollTop = log.scrollHeight;
  };
}

async function refreshFlows() {
  let data; try { data = await jget("/flows"); } catch { return; }
  const box = $("#flows"); box.textContent = "";
  (data.flows || []).forEach(f => {
    const card = el("div", "flow-card");
    card.append(el("div", "fn", f.name));
    card.append(el("div", "cmd", (f.cmd || []).join(" ")));
    const bits = [];
    if (f.cron) bits.push("cron: " + f.cron);
    if (f.retries) bits.push("retries: " + f.retries);
    if (f.concurrency) bits.push("concurrency: " + f.concurrency);
    if (bits.length) card.append(el("div", "cmd", bits.join("  ·  ")));
    box.append(card);
  });
}

document.querySelectorAll(".tab").forEach(t => t.onclick = () => {
  document.querySelectorAll(".tab").forEach(x => x.classList.toggle("active", x === t));
  const runs = t.dataset.tab === "runs";
  $("#runs-view").style.display = runs ? "" : "none";
  $("#sched-view").style.display = runs ? "none" : "";
  if (!runs) refreshFlows();
});

ping(); refreshRows();
setInterval(ping, 5000);
setInterval(refreshRows, 2000);
setInterval(() => { if (selected && $("#runs-view").style.display !== "none") { /* detail refresh is stream-driven */ } }, 3000);
</script>
</body>
</html>
